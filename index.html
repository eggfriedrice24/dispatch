<!doctype html>
<html
  lang="en"
  class="dark h-full"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Dispatch</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="relative h-full overflow-hidden">
    <!-- Flash-prevention: apply theme class synchronously before paint -->
    <script>
      (function () {
        var t = localStorage.getItem("dispatch-theme") || "dark";
        var r =
          t === "system"
            ? window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark"
            : t === "light" || t === "neo-brutal-light"
              ? "light"
              : "dark";
        var d = document.documentElement;
        d.classList.remove("dark", "light", "oled", "neo-brutal-dark", "neo-brutal-light", "neo-brutal-oled");
        d.classList.add(t === "system" ? r : t);
        d.style.colorScheme = r;
      })();
    </script>
    <div
      id="app"
      class="relative isolate flex h-full flex-col"
    ></div>
    <script
      type="module"
      src="/src/renderer/main.tsx"
    ></script>
  </body>
</html>
