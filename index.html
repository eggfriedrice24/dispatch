<!doctype html>
<html
  lang="en"
  class="dark h-full"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="theme-color"
      content="#08080a"
    />
    <title>Dispatch</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <!-- <script -->
    <!--   crossorigin="anonymous" -->
    <!--   src="//unpkg.com/react-scan/dist/auto.global.js" -->
    <!-- ></script> -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="relative h-full overflow-hidden">
    <!-- Flash-prevention: apply theme class synchronously before paint -->
    <script>
      (function () {
        var style = localStorage.getItem("dispatch-theme-style");
        var mode = localStorage.getItem("dispatch-color-mode");
        if (!style || !mode) {
          var old = localStorage.getItem("dispatch-theme") || "dark";
          var map = {
            light: ["default", "light"],
            system: ["default", "system"],
            oled: ["default", "oled"],
            "neo-brutal-dark": ["default", "dark"],
            "neo-brutal-light": ["default", "light"],
            "neo-brutal-oled": ["default", "oled"],
          };
          var m = map[old] || ["default", "dark"];
          style = m[0];
          mode = m[1];
        }
        var isOled = mode === "oled";
        var r =
          mode === "system"
            ? window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark"
            : mode === "light"
              ? "light"
              : "dark";
        var cls = isOled ? "oled" : r;
        var d = document.documentElement;
        var disableFontLigatures = localStorage.getItem("dispatch-disable-font-ligatures");
        d.classList.remove("dark", "light", "oled");
        d.classList.add(cls);
        d.style.colorScheme = r;
        if (disableFontLigatures === "true") {
          d.classList.add("font-ligatures-off");
        } else {
          d.classList.remove("font-ligatures-off");
        }
        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          var themeColor = cls === "light" ? "#f5f1eb" : cls === "oled" ? "#000000" : "#08080a";
          themeMeta.setAttribute("content", themeColor);
        }
      })();
    </script>
    <div
      id="app"
      class="relative isolate flex h-full flex-col"
    ></div>
    <script
      type="module"
      src="/src/renderer/main.tsx"
    ></script>
  </body>
</html>
