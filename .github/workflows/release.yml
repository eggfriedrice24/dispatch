name: Release

on:
  push:
    tags:
      - "v????-??-??*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional: 2026-04-13, 2026-04-13.1, or with v prefix)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # Release versioning rules:
          # - Canonical format is YYYY-MM-DD (UTC), with optional numeric suffix for same-day releases.
          # - Accepted manual inputs:
          #     2026-04-13
          #     2026-04-13.1
          #     v2026-04-13
          #     v2026-04-13.1
          # - If workflow_dispatch input is empty, auto-resolve to today's date in UTC.
          # - If today's base tag already exists, auto-increment suffix (.1, .2, ...).
          resolve_auto_version() {
            local base_date
            local has_base=false
            local max_suffix=0
            local suffix
            local tag

            base_date="$(date -u +%Y-%m-%d)"

            while IFS= read -r tag; do
              if [[ "$tag" == "v$base_date" ]]; then
                has_base=true
              elif [[ "$tag" =~ ^v${base_date}\.([0-9]+)$ ]]; then
                suffix="${BASH_REMATCH[1]}"
                if (( suffix > max_suffix )); then
                  max_suffix="$suffix"
                fi
              fi
            done < <(git tag -l "v${base_date}*")

            if [[ "$has_base" == "false" && "$max_suffix" -eq 0 ]]; then
              printf "%s\n" "$base_date"
            else
              printf "%s.%d\n" "$base_date" "$((max_suffix + 1))"
            fi
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version || '' }}"
            if [[ -z "$raw" ]]; then
              version="$(resolve_auto_version)"
            else
              version="${raw#v}"
            fi
          else
            raw="${GITHUB_REF_NAME}"
            version="${raw#v}"
          fi

          if [[ ! "$version" =~ ^([0-9]{4}-[0-9]{2}-[0-9]{2})(\.([0-9]+))?$ ]]; then
            echo "Invalid release version: $raw" >&2
            echo "Expected format: YYYY-MM-DD or YYYY-MM-DD.N (optionally prefixed with v)." >&2
            exit 1
          fi

          base_date="${BASH_REMATCH[1]}"
          if ! date -d "$base_date" "+%Y-%m-%d" >/dev/null 2>&1; then
            echo "Invalid calendar date: $base_date" >&2
            exit 1
          fi

          tag="v$version"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Release tag already exists: $tag" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          echo "make_latest=true" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Align package version to release version
        run: bun scripts/update-release-version.ts "${{ needs.preflight.outputs.version }}"

      - name: Build release artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          signing_env=()

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS signing enabled."
            else
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              echo "macOS signing disabled (missing one or more signing secrets)."
            fi
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            if has_all "$WIN_CSC_LINK" "$WIN_CSC_KEY_PASSWORD"; then
              echo "Windows signing enabled."
            else
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              echo "Windows signing disabled (missing one or more signing secrets)."
            fi
          else
            echo "Signing not applicable for ${{ matrix.platform }}."
          fi

          bun run build:app -- --${{ matrix.platform }} --${{ matrix.arch }}

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.deb" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dispatch-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          bun scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Ensure release tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag already exists: ${RELEASE_TAG}"
            exit 0
          fi

          git tag "${RELEASE_TAG}" "${{ needs.preflight.outputs.ref }}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Dispatch v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/latest*.yml
          fail_on_unmatched_files: true

  finalize:
    name: Finalize release
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    steps:
      - id: app_token
        name: Mint release app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - id: update_version
        name: Update version string
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: bun scripts/update-release-version.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json
        if: steps.update_version.outputs.changed == 'true'
        run: bunx oxfmt package.json

      - name: Refresh lockfile
        if: steps.update_version.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_version.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "${{ steps.app_bot.outputs.name }}"
          git config user.email "${{ steps.app_bot.outputs.email }}"

          git add package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
